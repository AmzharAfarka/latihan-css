<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lesson 9: Amzhar Afarka</title>
  <link rel="stylesheet" href="lesson9.css">
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    h1 {
      font-size: 20px;
      margin-top: 20px;
    }

    /* Kotak umum */
    .box {
      width: 60px;
      height: 60px;
      margin: 10px 0;
    }

    /* 9a */
    .red {
      background-color: red;
    }

    /* 9b */
    .circle {
      background-color: green;
      border-radius: 50%;
    }

    /* 9c */
    .card {
      border: 1px solid gray;
      padding: 10px;
      width: 250px;
      background-color: #eee;
      margin-bottom: 20px;
    }

    /* 9d */
    .youtube-box {
      background-color: #333;
      color: white;
      padding: 10px;
      width: 300px;
    }

    .youtube-box p {
      color: #ccc;
      font-size: 14px;
    }
  </style>

</head>
<body>

<h1>Soal 9a</h1>
<div class="box red"></div>

<h1>Soal 9b</h1>
<div class="box circle"></div>

<h1>Soal 9c</h1>
<div class="card">
  <p>Satisfied with our service?</p>
  <button>Yes</button>
  <button>No</button>
</div>

<h1>Soal 9d</h1>
<div class="youtube-box">
  <h4>Install YouTube Music</h4>
  <p>Add YouTube Music to your desktop for quick and easy access</p>
</div>

<h1>Soal 9e</h1>
  <div class="tweet-box">
    <img src="ogurin.jpg" alt="">
    <input type="text" placeholder="What's happening?">
    <button>Tweet</button>
  </div>

  <h1>Soal 9f dan 9g</h1>
  <div class="card">
    <img src="rin.jpg" alt="cat">
    <p class="name">Oliver</p>
    <p class="mutual">2 mutual friends</p>
    <button>Add Friend</button>
  </div>

  <div class="card">
    <img src="tamama.jpg" alt="cat">
    <p class="name">Mimi</p>
    <p class="mutual">3 mutual friends</p>
    <button>Add Friend</button>
  </div>

  <div class="card">
    <img src="tmtm.jpg" alt="dog">
    <p class="name">Rex</p>
    <p class="mutual">4 mutual friends</p>
    <button>Add Friend</button>
  </div>

  <h1>Soal 9h</h1>
<div class="google-logo">
  <img src="images.png" alt="Google Logo">
</div>

<div class="search-box">
  <input type="text" placeholder="Search Google or type a URL">
</div>

<div class="button-box">
  <button>Google Search</button>
  <button>I'm Feeling Lucky</button>
</div>

</body>
</html>
